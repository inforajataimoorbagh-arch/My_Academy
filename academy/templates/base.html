<!DOCTYPE html>
<html>
<head>
    <title>Teacher Portal</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #f4f6f9;
        }

        nav {
            background: #2c3e50;
            padding: 15px;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin-right: 20px;
            font-weight: bold;
        }

        .container {
            width: 90%;
            margin: 20px auto;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        footer {
            text-align: center;
            padding: 15px;
            background: #2c3e50;
            color: white;
            margin-top: 30px;
        }
    </style>
</head>
<body>

<nav>
    <a href="/">Home</a>
    <a href="/notes/">Notes</a>
    <a href="/videos/">Videos</a>
    <a href="/quiz/">Quiz</a>
    <a href="/dashboard/">Dashboard</a>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

<footer>
    Teacher Portal © 2026
</footer>

</body>
</html>
